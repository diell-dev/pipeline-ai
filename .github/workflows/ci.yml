name: CI

# Audit G2 (2026-07-20): the repo had no automated checks at all, which is
# how 16 dependency vulnerabilities accumulated silently between April and
# July and how a type error could reach production unnoticed.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` installs exactly what the lockfile pins — the same thing
      # Vercel does — so CI can't pass on a tree the deploy won't reproduce.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run

      - name: Production build
        run: npm run build
        env:
          # Build-time placeholders. The app reads real values from Vercel at
          # runtime; these only need to exist so module-level config checks
          # don't throw during the build.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://example.com

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Fails the job on a moderate-or-worse advisory in the PRODUCTION tree.
      # Dev-only advisories are reported but don't block (they don't ship).
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Audit all dependencies (informational)
        run: npm audit || true
